<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Quản Lý Mật Khẩu An Toàn</title>
    
    <!-- SEO & PWA Meta Tags -->
    <meta name="description" content="Một trình quản lý mật khẩu an toàn, hiện đại sử dụng Firebase.">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/876/876219.png" type="image/png">
    <meta name="theme-color" content="#4f46e5">

    <!-- Thư viện CSS và JS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
            --dark-bg: #0f172a;
            --light-bg: #f1f5f9;
        }

        /* Gradient Background */
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--light-bg);
            background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 20px 20px;
            transition: background-color 0.3s ease-in-out;
        }

        .dark body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
        }

        /* Glassmorphism Effect for Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .dark .glass-header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* SweetAlert Dark Mode Customization */
        .dark .swal2-popup {
            background-color: #1e293b !important;
            color: #e2e8f0 !important;
        }
        .dark .swal2-title { color: #f1f5f9 !important; }
        .dark .swal2-html-container { color: #94a3b8 !important; }
        .dark .swal2-confirm { background-color: var(--primary) !important; }
        .dark .swal2-cancel { background-color: #475569 !important; }

    </style>
</head>
<body class="min-h-screen text-slate-800 dark:text-slate-200">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center transition-opacity duration-300">
        <div id="loading-content" class="flex flex-col items-center gap-4 text-center p-4">
            <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm font-semibold text-slate-600 dark:text-slate-300">Đang tải dữ liệu...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-header">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary/10 text-primary flex items-center justify-center rounded-lg">
                        <i data-lucide="key-round"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight">Password Manager</h1>
                        <span id="user-role" class="text-xs font-bold text-slate-500 uppercase">Guest</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-amber-400"></i>
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden text-slate-600"></i>
                    </button>
                    <div id="auth-container">
                        <button onclick="authManager.login()" class="px-4 py-2 bg-primary text-white text-sm font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition-all">Đăng Nhập</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="app-content" class="hidden">
            <!-- Action Bar -->
            <div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 mb-8 fade-in">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="relative w-full md:w-1/2 lg:w-1/3">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="text" id="search-input" placeholder="Tìm theo website hoặc tài khoản..." class="w-full pl-10 pr-4 py-2.5 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition">
                    </div>
                    <div id="admin-actions" class="hidden flex-shrink-0 flex items-center flex-wrap justify-center gap-2">
                         <button onclick="uiManager.openModal()" class="flex items-center gap-2 px-4 py-2.5 bg-primary text-white text-sm font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition-all">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            Thêm Mới
                        </button>
                        <button onclick="excelManager.exportToExcel()" class="flex items-center gap-2 px-4 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-lg shadow-md hover:bg-green-700 transition-all">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                            Export Excel
                        </button>
                         <label for="import-excel" class="cursor-pointer flex items-center gap-2 px-4 py-2.5 bg-sky-500 text-white text-sm font-semibold rounded-lg shadow-md hover:bg-sky-600 transition-all">
                            <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                            Import Excel
                        </label>
                        <input type="file" id="import-excel" class="hidden" accept=".xlsx, .xls" onchange="excelManager.importFromExcel(event)">
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="bg-white dark:bg-slate-800/50 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden fade-in" style="animation-delay: 0.1s;">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-50 dark:bg-slate-900/50 text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                            <tr>
                                <th scope="col" class="px-6 py-3 min-w-[200px]">Website</th>
                                <th scope="col" class="px-6 py-3 min-w-[200px]">Tài khoản</th>
                                <th scope="col" class="px-6 py-3 min-w-[250px]">Mật khẩu</th>
                                <th scope="col" class="px-6 py-3 text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="password-table-body">
                            <!-- Rows will be injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
                 <!-- Empty State -->
                <div id="empty-state" class="hidden text-center p-16">
                    <i data-lucide="database-zap" class="w-16 h-16 text-slate-300 dark:text-slate-600 mx-auto"></i>
                    <h3 class="mt-4 text-lg font-semibold text-slate-700 dark:text-slate-300">Chưa có dữ liệu</h3>
                    <p class="mt-1 text-sm text-slate-500">Hãy bắt đầu bằng cách thêm một tài khoản mới.</p>
                </div>
                <!-- Pagination -->
                <div id="pagination-controls" class="p-4 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between">
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="form-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-lg shadow-2xl m-4 transform transition-all opacity-0 -translate-y-4" id="modal-content">
            <form id="password-form" class="space-y-6">
                <div class="flex items-center justify-between p-6 border-b border-slate-200 dark:border-slate-700">
                    <h3 id="modal-title" class="text-lg font-bold">Thêm Tài Khoản Mới</h3>
                    <button type="button" onclick="uiManager.closeModal()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="px-6 space-y-4">
                    <input type="hidden" id="entry-id">
                    <div>
                        <label for="website" class="text-sm font-medium text-slate-700 dark:text-slate-300">Website URL</label>
                        <div class="relative mt-1">
                             <i data-lucide="globe" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="url" id="website" required class="w-full pl-10 pr-4 py-2.5 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition" placeholder="https://example.com">
                        </div>
                    </div>
                     <div>
                        <label for="account" class="text-sm font-medium text-slate-700 dark:text-slate-300">Tài khoản (Email, Username)</label>
                         <div class="relative mt-1">
                             <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="text" id="account" required class="w-full pl-10 pr-4 py-2.5 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition" placeholder="example@email.com">
                        </div>
                    </div>
                     <div>
                        <label for="password" class="text-sm font-medium text-slate-700 dark:text-slate-300">Mật khẩu</label>
                         <div class="relative mt-1">
                             <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="password" id="password" required class="w-full pl-10 pr-12 py-2.5 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition" placeholder="••••••••••••">
                            <button type="button" id="toggle-modal-password" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-end gap-4 p-6 bg-slate-50 dark:bg-slate-900/50 rounded-b-2xl">
                    <button type="button" onclick="document.getElementById('password-form').reset()" class="px-4 py-2.5 text-sm font-semibold rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition">Reset</button>
                    <button type="submit" class="px-6 py-2.5 bg-primary text-white text-sm font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition">Lưu</button>
                </div>
            </form>
        </div>
    </div>

<script type="module">
    // Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CẤU HÌNH ---

    // [CRITICAL SECURITY WARNING]
    // DO NOT hardcode your Firebase configuration here in a public application.
    // Anyone can view this information and potentially abuse your Firebase project.
    // Use environment variables and a build process (e.g., Vite, Webpack) to manage these secrets securely.
    // For demonstration, placeholders are used below.
     const firebaseConfig = {
        apiKey: "AIzaSyCLCcgaoW9gNYhKk0c0gDWC6i5mKVTN4XE",
        authDomain: "profile-d1214.firebaseapp.com",
        projectId: "profile-d1214",
        storageBucket: "profile-d1214.firebasestorage.app",
        messagingSenderId: "914980131889",
        appId: "1:914980131889:web:72f8da15c42dbee671b110",
        measurementId: "G-C587M69LZW"
    };

    /*
     * [CRITICAL SECURITY WARNING]
     * Data security MUST be enforced on the backend using Firestore Security Rules.
     * The `ADMIN_EMAILS` array below is ONLY for controlling the user interface (e.g., showing/hiding buttons).
     * It DOES NOT prevent a malicious user from modifying your database.
     *
     * Go to your Firebase Console -> Firestore Database -> Rules and set up rules like this:
     *
     * rules_version = '2';
     * service cloud.firestore {
     *   match /databases/{database}/documents {
     *     match /password_manager/{docId} {
     *       // Any authenticated user can read the data.
     *       allow read: if request.auth != null;
     *       // ONLY users whose email is in the admin list can create, update, or delete.
     *       allow write, delete: if request.auth != null && request.auth.token.email in ['your.admin.email@example.com', 'another.admin@example.com'];
     *     }
     *   }
     * }
     */
    const ADMIN_EMAILS = ["sonlyhongduc@gmail.com"]; // <-- REPLACE WITH YOUR ADMIN EMAILS

    // --- KHỞI TẠO FIREBASE ---
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const passwordCollection = collection(db, "password_manager");

    // --- BIẾN TOÀN CỤC & HẰNG SỐ ---
    let currentUser = null;
    let isAdmin = false;
    let allEntries = [];
    let displayedEntries = [];
    let currentPage = 1;
    let loadingTimeout = null;

    const ITEMS_PER_PAGE = 10;
    const LOADING_TIMEOUT_MS = 15000; // 15 seconds
    const DEFAULT_FAVICON = 'https://cdn-icons-png.flaticon.com/512/876/876219.png';

    // --- CACHED DOM ELEMENTS ---
    const dom = {
        loadingOverlay: document.getElementById('loading-overlay'),
        loadingContent: document.getElementById('loading-content'),
        appContent: document.getElementById('app-content'),
        adminActions: document.getElementById('admin-actions'),
        authContainer: document.getElementById('auth-container'),
        userRole: document.getElementById('user-role'),
        tableBody: document.getElementById('password-table-body'),
        emptyState: document.getElementById('empty-state'),
        paginationControls: document.getElementById('pagination-controls'),
        formModal: document.getElementById('form-modal'),
        modalContent: document.getElementById('modal-content'),
        passwordForm: document.getElementById('password-form'),
        modalTitle: document.getElementById('modal-title'),
        entryId: document.getElementById('entry-id'),
        websiteInput: document.getElementById('website'),
        accountInput: document.getElementById('account'),
        passwordInput: document.getElementById('password'),
        searchInput: document.getElementById('search-input'),
    };

    // --- QUẢN LÝ UI (UI MANAGER) ---
    const uiManager = {
        showLoading: () => {
            dom.loadingContent.innerHTML = `
                <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm font-semibold text-slate-600 dark:text-slate-300">Đang tải dữ liệu...</p>
            `;
            dom.loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');

            clearTimeout(loadingTimeout);
            loadingTimeout = setTimeout(() => {
                dom.loadingContent.innerHTML = `
                    <i data-lucide="wifi-off" class="w-10 h-10 text-danger"></i>
                    <p class="mt-2 font-bold text-red-600 dark:text-red-400">Tải dữ liệu quá lâu!</p>
                    <p class="text-xs text-slate-500 max-w-xs">Vui lòng kiểm tra lại kết nối mạng hoặc cấu hình Firebase.</p>
                    <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-primary text-white text-sm font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition-all">Thử Lại</button>
                `;
                lucide.createIcons();
            }, LOADING_TIMEOUT_MS);
        },
        
        hideLoading: () => {
            clearTimeout(loadingTimeout);
            dom.loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
        },
        
        openModal: (entry = null) => {
            dom.passwordForm.reset();
            
            dom.modalTitle.textContent = entry ? 'Chỉnh Sửa Tài Khoản' : 'Thêm Tài Khoản Mới';
            if(entry) {
                dom.entryId.value = entry.id;
                dom.websiteInput.value = entry.website;
                dom.accountInput.value = entry.account;
                dom.passwordInput.value = entry.password;
            } else {
                dom.entryId.value = '';
            }

            dom.formModal.classList.remove('hidden');
            setTimeout(() => {
                dom.modalContent.classList.remove('opacity-0', '-translate-y-4');
                dom.websiteInput.focus(); // UX Improvement: Autofocus first input
            }, 50);
        },

        closeModal: () => {
            dom.modalContent.classList.add('opacity-0', '-translate-y-4');
            setTimeout(() => {
                dom.formModal.classList.add('hidden');
            }, 300);
        },

        showToast: (message, isError = false) => {
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
            Toast.fire({ icon: isError ? 'error' : 'success', title: message });
        },
        
        toggleModalPassword: () => {
            const icon = document.querySelector('#toggle-modal-password i');
            const isPassword = dom.passwordInput.type === 'password';
            dom.passwordInput.type = isPassword ? 'text' : 'password';
            icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons();
        },

        renderTable: () => {
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageEntries = displayedEntries.slice(startIndex, endIndex);

            if (pageEntries.length === 0 && dom.searchInput.value === '') {
                dom.tableBody.innerHTML = '';
                dom.emptyState.classList.remove('hidden');
                dom.paginationControls.classList.add('hidden');
                return;
            }
            
            dom.emptyState.classList.add('hidden');
            dom.paginationControls.classList.remove('hidden');
            
            dom.tableBody.innerHTML = pageEntries.map(entry => {
                let domain = 'unknown.com';
                try {
                    domain = new URL(entry.website).hostname;
                } catch (e) {
                    const matches = entry.website.match(/^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)/);
                    if (matches && matches[1]) {
                        domain = matches[1];
                    }
                }
                const favicon = `https://icons.duckduckgo.com/ip3/${domain}.ico`;
                
                return `
                    <tr class="border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-900/20 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <img src="${favicon}" alt="Favicon" class="w-6 h-6 rounded-md object-cover bg-slate-200" onerror="this.onerror=null;this.src='${DEFAULT_FAVICON}'">
                                <div class="flex-1 min-w-0">
                                    <a href="${entry.website}" target="_blank" class="font-semibold text-primary hover:underline truncate block">${domain}</a>
                                </div>
                                <a href="${entry.website}" target="_blank" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700">
                                    <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                                </a>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <span class="font-mono text-slate-600 dark:text-slate-300 truncate">${entry.account}</span>
                                <button onclick="app.copyToClipboard('${entry.account}', 'Tài khoản')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                             <div id="password-cell-${entry.id}" class="flex items-center gap-2" data-visible="false">
                                ${isAdmin ? `
                                    <span class="font-mono text-slate-600 dark:text-slate-300">••••••••••••</span>
                                    <button onclick="app.togglePasswordDisplay('${entry.id}')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700">
                                        <i data-lucide="eye" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="app.copyPassword('${entry.id}')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700">
                                        <i data-lucide="copy" class="w-4 h-4"></i>
                                    </button>
                                ` : `
                                    <span class="font-mono text-slate-400">••••••••••••</span>
                                    <i data-lucide="eye-off" class="w-4 h-4 text-slate-400"></i>
                                `}
                             </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${isAdmin ? `
                            <div class="flex items-center justify-center gap-2">
                                <button onclick='app.editEntry("${entry.id}")' class="p-2 rounded-lg text-blue-500 hover:bg-blue-100 dark:hover:bg-blue-900/20">
                                    <i data-lucide="edit" class="w-4 h-4"></i>
                                </button>
                                <button onclick='app.confirmDelete("${entry.id}")' class="p-2 rounded-lg text-red-500 hover:bg-red-100 dark:hover:bg-red-900/20">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                            ` : `<span class="px-2 py-1 text-xs font-semibold text-slate-500 bg-slate-100 dark:bg-slate-700 rounded-full">Read-Only</span>`}
                        </td>
                    </tr>
                `;
            }).join('');
            
            uiManager.renderPagination();
            lucide.createIcons();
        },
        
        renderPagination: () => {
            const totalPages = Math.ceil(displayedEntries.length / ITEMS_PER_PAGE);
            if (totalPages <= 1) {
                dom.paginationControls.innerHTML = ''; return;
            }
            let buttons = '';
            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button onclick="app.changePage(${i})" class="px-3 py-1 rounded-md text-sm font-semibold ${currentPage === i ? 'bg-primary text-white' : 'hover:bg-slate-200 dark:hover:bg-slate-700'}">${i}</button>`;
            }
            dom.paginationControls.innerHTML = `<span class="text-sm text-slate-500">Trang ${currentPage} / ${totalPages}</span><div class="flex items-center gap-1">${buttons}</div>`;
        },

        updateUIAfterAuth: () => {
            if (currentUser) {
                dom.authContainer.innerHTML = `<div class="flex items-center gap-3"><img src="${currentUser.photoURL}" alt="Avatar" class="w-9 h-9 rounded-full border-2 border-primary/50"><button onclick="authManager.logout()" class="p-2 rounded-lg text-red-500 hover:bg-red-100 dark:hover:bg-red-900/20"><i data-lucide="log-out" class="w-5 h-5"></i></button></div>`;
                dom.userRole.textContent = isAdmin ? 'Admin' : 'User';
                dom.appContent.classList.remove('hidden');
                dom.adminActions.classList.toggle('hidden', !isAdmin);
            } else {
                 dom.authContainer.innerHTML = `<button onclick="authManager.login()" class="px-4 py-2 bg-primary text-white text-sm font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition-all">Đăng Nhập</button>`;
                 dom.userRole.textContent = 'Guest';
                 dom.appContent.classList.add('hidden');
                 allEntries = []; displayedEntries = []; uiManager.renderTable();
            }
            lucide.createIcons();
        }
    };
    
    // --- QUẢN LÝ XÁC THỰC (AUTH MANAGER) ---
    const authManager = {
        login: () => { uiManager.showLoading(); signInWithPopup(auth, provider).catch(err => { console.error("Login Error:", err); uiManager.showToast("Đăng nhập thất bại.", true); }).finally(uiManager.hideLoading); },
        logout: () => { signOut(auth).then(() => { uiManager.showToast("Đăng xuất thành công!"); }); },
        init: () => { onAuthStateChanged(auth, user => { currentUser = user; isAdmin = user && ADMIN_EMAILS.includes(user.email); uiManager.updateUIAfterAuth(); if(user) { app.listenForChanges(); } }); }
    };
    
    // --- QUẢN LÝ EXCEL (EXCEL MANAGER) ---
    const excelManager = {
        exportToExcel: () => { if(!isAdmin) return; const data = allEntries.map(({ website, account, password }) => ({ Website: website, Account: account, Password: password })); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Passwords"); XLSX.writeFile(wb, "passwords_export.xlsx"); uiManager.showToast("Xuất Excel thành công!"); },
        importFromExcel: (event) => { if (!isAdmin) return; const file = event.target.files[0]; if (!file) return; uiManager.showLoading(); const reader = new FileReader(); reader.onload = async (e) => { try { const data = new Uint8Array(e.target.result); const wb = XLSX.read(data, { type: 'array' }); const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); let successCount = 0; for (const item of json) { const website = item.Website || item.website; const account = item.Account || item.account; const password = item.Password || item.password; if (website && account && password) { await addDoc(passwordCollection, { website, account, password, createdAt: serverTimestamp() }); successCount++; } } uiManager.showToast(`Nhập thành công ${successCount} mục!`); } catch (err) { console.error("Import Error:", err); uiManager.showToast("Nhập file thất bại. Kiểm tra định dạng file.", true); } finally { uiManager.hideLoading(); event.target.value = ''; } }; reader.readAsArrayBuffer(file); }
    };

    // --- ỨNG DỤNG CHÍNH (APP LOGIC) ---
    const app = {
        listenForChanges: () => {
            uiManager.showLoading();
            const q = query(passwordCollection, orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                allEntries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                app.filterEntries();
                uiManager.hideLoading();
            }, (error) => {
                console.error("Firestore listen error:", error);
                uiManager.showToast("Không thể tải dữ liệu. Kiểm tra console.", true);
                uiManager.hideLoading();
            });
        },

        handleFormSubmit: async (e) => { e.preventDefault(); if(!isAdmin) return; const id = dom.entryId.value; const data = { website: dom.websiteInput.value, account: dom.accountInput.value, password: dom.passwordInput.value }; uiManager.showLoading(); try { if(id) { await updateDoc(doc(db, "password_manager", id), data); uiManager.showToast("Cập nhật thành công!"); } else { data.createdAt = serverTimestamp(); await addDoc(passwordCollection, data); uiManager.showToast("Thêm mới thành công!"); } uiManager.closeModal(); } catch(err) { console.error("Form Submit Error:", err); uiManager.showToast("Lưu thất bại.", true); } finally { uiManager.hideLoading(); } },
        editEntry: (id) => { const entry = allEntries.find(e => e.id === id); if(entry) uiManager.openModal(entry); },
        confirmDelete: (id) => { Swal.fire({ title: 'Bạn chắc chắn chứ?', text: "Hành động này không thể hoàn tác!", icon: 'warning', showCancelButton: true, confirmButtonColor: 'var(--danger)', cancelButtonColor: '#6b7280', confirmButtonText: 'Vâng, xóa nó!', cancelButtonText: 'Hủy' }).then(async (result) => { if (result.isConfirmed) { uiManager.showLoading(); try { await deleteDoc(doc(db, "password_manager", id)); uiManager.showToast("Đã xóa thành công!"); } catch (err) { console.error("Delete Error:", err); uiManager.showToast("Xóa thất bại.", true); } finally { uiManager.hideLoading(); } } }) },
        
        togglePasswordDisplay: (id) => {
            if (!isAdmin) return;
            const cell = document.getElementById(`password-cell-${id}`);
            const entry = allEntries.find(e => e.id === id);
            if (!cell || !entry) return;

            const isVisible = cell.getAttribute('data-visible') === 'true';
            if (isVisible) {
                cell.innerHTML = `
                    <span class="font-mono text-slate-600 dark:text-slate-300">••••••••••••</span>
                    <button onclick="app.togglePasswordDisplay('${id}')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700"><i data-lucide="eye" class="w-4 h-4"></i></button>
                    <button onclick="app.copyPassword('${id}')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700"><i data-lucide="copy" class="w-4 h-4"></i></button>
                `;
                cell.setAttribute('data-visible', 'false');
            } else {
                cell.innerHTML = `
                    <input type="text" value="${entry.password}" readonly class="w-full font-mono bg-transparent border-none p-0 focus:ring-0 text-slate-800 dark:text-slate-100">
                    <button onclick="app.togglePasswordDisplay('${id}')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700"><i data-lucide="eye-off" class="w-4 h-4"></i></button>
                    <button onclick="app.copyPassword('${id}')" class="p-2 rounded-lg text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700"><i data-lucide="copy" class="w-4 h-4"></i></button>
                `;
                cell.setAttribute('data-visible', 'true');
                cell.querySelector('input')?.select();
            }
            lucide.createIcons();
        },

        copyToClipboard: (text, type) => { navigator.clipboard.writeText(text).then(() => { uiManager.showToast(`Đã sao chép ${type}!`); }, () => { uiManager.showToast('Sao chép thất bại.', true); }); },
        copyPassword: (id) => { if (!isAdmin) return; const entry = allEntries.find(e => e.id === id); if (entry) app.copyToClipboard(entry.password, 'Mật khẩu'); },
        filterEntries: () => { const term = dom.searchInput.value.toLowerCase(); displayedEntries = term ? allEntries.filter(e => e.website.toLowerCase().includes(term) || e.account.toLowerCase().includes(term)) : [...allEntries]; currentPage = 1; uiManager.renderTable(); },
        changePage: (page) => { currentPage = page; uiManager.renderTable(); },
        init: () => { authManager.init(); dom.passwordForm.addEventListener('submit', app.handleFormSubmit); dom.searchInput.addEventListener('input', app.filterEntries); document.getElementById('toggle-modal-password').addEventListener('click', uiManager.toggleModalPassword); }
    };
    
    // --- THEME ---
    const toggleTheme = () => { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); applyTheme(); };
    const applyTheme = () => { const theme = localStorage.getItem('theme'); if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } else { document.documentElement.classList.remove('dark'); } lucide.createIcons(); };

    // --- KHỞI CHẠY ---
    applyTheme();
    app.init();
    
    // --- EXPOSE TO GLOBAL SCOPE ---
    // This is necessary for the `onclick` attributes in the HTML to work.
    // A more advanced approach would be to use event delegation and attach all listeners programmatically in the JS.
    window.authManager = authManager;
    window.uiManager = uiManager;
    window.excelManager = excelManager;
    window.app = app;
    window.toggleTheme = toggleTheme;
</script>

</body>
</html>
