<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Địa Điểm Lân Cận</title>

    <!-- Thêm thư viện LeafletJS để vẽ bản đồ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <style>
        /* CSS để giao diện trông đẹp hơn */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #map {
            flex-basis: 70%;
            height: 100%;
        }

        .sidebar {
            flex-basis: 30%;
            padding: 15px;
            background-color: #f4f4f4;
            overflow-y: auto;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            margin-top: 0;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #search-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #search-btn {
            padding: 8px 12px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        #search-btn:hover {
            background-color: #0056b3;
        }

        #results-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        #results-list li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        #results-list li:hover {
            background-color: #e9e9e9;
        }

        .status {
            margin-top: 15px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Phần hiển thị bản đồ -->
        <div id="map"></div>

        <!-- Phần giao diện điều khiển và kết quả -->
        <div class="sidebar">
            <h1>Tìm Xung Quanh Đây</h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="ví dụ: nhà hàng, cà phê, ATM...">
                <button id="search-btn">Tìm</button>
            </div>
            <p id="status" class="status">Đang yêu cầu vị trí của bạn...</p>
            <ul id="results-list"></ul>
        </div>
    </div>

    <script>
        // === KHAI BÁO BIẾN TOÀN CỤC ===
        const mapElement = document.getElementById('map');
        const statusElement = document.getElementById('status');
        const resultsList = document.getElementById('results-list');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        let map = null; // Biến chứa đối tượng bản đồ
        let userMarker = null; // Biến chứa marker vị trí người dùng
        let placeMarkers = []; // Mảng chứa các marker của địa điểm tìm được
        let userCoords = null; // Tọa độ người dùng

        // === CÁC HÀM XỬ LÝ ===

        /**
         * Hàm khởi tạo bản đồ tại một tọa độ và mức zoom cho trước
         */
        function initializeMap(lat, lon) {
            // Nếu bản đồ chưa được khởi tạo
            if (!map) {
                map = L.map(mapElement).setView([lat, lon], 15); // Mức zoom 15

                // Thêm lớp bản đồ nền từ OpenStreetMap
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(map);

                // Tạo marker cho vị trí người dùng
                const userIcon = L.icon({
                    iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                });
                userMarker = L.marker([lat, lon], { icon: userIcon }).addTo(map)
                    .bindPopup('<b>Vị trí của bạn</b>')
                    .openPopup();
            } else {
                // Nếu bản đồ đã có, chỉ cần di chuyển đến vị trí mới
                map.setView([lat, lon], 15);
                userMarker.setLatLng([lat, lon]);
            }
        }
        
        /**
         * Hàm xóa các marker địa điểm cũ trên bản đồ
         */
        function clearPlaceMarkers() {
            for (const marker of placeMarkers) {
                map.removeLayer(marker);
            }
            placeMarkers = [];
        }


        /**
         * Hàm tìm kiếm địa điểm bằng API Overpass của OpenStreetMap
         */
        async function searchNearbyPlaces(lat, lon, query) {
            statusElement.textContent = `Đang tìm "${query}"...`;
            resultsList.innerHTML = ''; // Xóa kết quả cũ
            clearPlaceMarkers(); // Xóa marker cũ

            const radius = 5000; // Bán kính tìm kiếm: 5000 mét (5km)
            
            // Xây dựng truy vấn Overpass QL
            const overpassQuery = `
                [out:json];
                (
                  node["amenity"="${query}"](around:${radius},${lat},${lon});
                  way["amenity"="${query}"](around:${radius},${lat},${lon});
                  relation["amenity"="${query}"](around:${radius},${lat},${lon});
                );
                out center;
            `;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.elements.length === 0) {
                     statusElement.textContent = `Không tìm thấy địa điểm nào phù hợp với "${query}".`;
                     return;
                }

                statusElement.textContent = `Tìm thấy ${data.elements.length} kết quả cho "${query}":`;
                displayResults(data.elements);

            } catch (error) {
                console.error("Lỗi khi tìm kiếm:", error);
                statusElement.textContent = "Đã xảy ra lỗi khi tìm kiếm.";
            }
        }

        /**
         * Hàm hiển thị kết quả ra danh sách và bản đồ
         */
        function displayResults(places) {
            places.forEach(place => {
                const name = place.tags.name || "Không có tên";
                const lat = place.lat || place.center.lat;
                const lon = place.lon || place.center.lon;
                
                // Hiển thị trên danh sách
                const listItem = document.createElement('li');
                listItem.textContent = name;
                listItem.onclick = () => {
                    map.setView([lat, lon], 17); // Zoom vào địa điểm khi click
                    placeMarkers.find(m => m.getLatLng().lat === lat && m.getLatLng().lng === lon).openPopup();
                };
                resultsList.appendChild(listItem);

                // Đánh dấu trên bản đồ
                const placeMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`<b>${name}</b>`);
                placeMarkers.push(placeMarker);
            });
        }


        // === XỬ LÝ SỰ KIỆN ===

        // Sự kiện khi trang được tải xong
        document.addEventListener('DOMContentLoaded', () => {
            if (!navigator.geolocation) {
                statusElement.textContent = "Trình duyệt của bạn không hỗ trợ định vị.";
                return;
            }

            // Lấy vị trí hiện tại
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoords = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };
                    statusElement.textContent = "Đã lấy được vị trí của bạn! Nhập từ khóa để tìm kiếm.";
                    initializeMap(userCoords.lat, userCoords.lon);
                },
                (error) => {
                    statusElement.textContent = "Không thể lấy vị trí. Vui lòng cấp quyền truy cập.";
                    console.error("Lỗi Geolocation:", error);
                }
            );
        });
        
        // Sự kiện click nút tìm kiếm
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim().toLowerCase();
            if (query && userCoords) {
                searchNearbyPlaces(userCoords.lat, userCoords.lon, query);
            } else if (!userCoords) {
                statusElement.textContent = "Chưa có vị trí của bạn để bắt đầu tìm kiếm.";
            }
        });
        
        // Sự kiện nhấn Enter trong ô tìm kiếm
        searchInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                searchBtn.click();
            }
        });

    </script>

</body>
</html>
