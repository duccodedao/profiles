<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý File Chuyên nghiệp</title>
    
    <meta name="description" content="Hệ thống quản lý, lưu trữ và chia sẻ file chuyên nghiệp.">
    <link rel="icon" href="https://hdd.io.vn/img/bmassloadings.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb', secondary: '#f43f5e', dark: '#0f172a' } } }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; transition: background 0.3s; } 
        .dark body { background-color: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark .glass { background: rgba(30, 41, 59, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .loader { width: 24px; height: 24px; border: 3px solid #e2e8f0; border-bottom-color: #2563eb; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #folder-tree ul { padding-left: 1rem; border-left: 1px solid #e2e8f0; }
        .dark #folder-tree ul { border-left-color: #334155; }
        #folder-tree .folder-item { cursor: pointer; }
        #folder-tree .folder-item.active { color: #2563eb; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Loading Overlay -->
    <div id="global-loading" class="fixed inset-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm z-[900] flex flex-col items-center justify-center transition-opacity duration-300 opacity-0 pointer-events-none">
        <span class="loader mb-4"></span>
        <span id="loading-text" class="text-sm font-bold text-slate-600 dark:text-slate-300">Đang xử lý...</span>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-[100] glass px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
                <i data-lucide="folder-archive" class="w-6 h-6"></i>
            </div>
            <h1 class="text-sm font-black uppercase tracking-wider">KHO LƯU TRỮ</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="window.toggleTheme()" class="p-2 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
            </button>
            <div id="auth-section"></div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex h-[calc(100vh-80px)]">
        <!-- Sidebar - Cây thư mục -->
        <aside class="w-64 bg-white dark:bg-slate-800/50 border-r dark:border-white/10 p-4 shrink-0 overflow-y-auto">
            <h3 class="text-xs font-bold uppercase text-slate-400 mb-4">Cây thư mục</h3>
            <div id="folder-tree-container"></div>
        </aside>

        <!-- File Area -->
        <main class="flex-1 flex flex-col p-6 overflow-y-auto">
            <!-- Toolbar & Breadcrumbs -->
            <div class="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center mb-6">
                <!-- Breadcrumbs -->
                <div id="breadcrumbs" class="flex items-center gap-2 text-sm font-medium text-slate-500"></div>

                <!-- Actions -->
                <div id="main-actions" class="flex gap-2 shrink-0 hidden">
                     <button onclick="window.openCreateFolderModal()" class="flex items-center gap-2 px-4 py-2 border dark:border-white/10 text-slate-700 dark:text-slate-200 rounded-lg font-bold text-xs uppercase hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                        <i data-lucide="folder-plus" class="w-4 h-4"></i> <span class="hidden sm:inline">Thư mục mới</span>
                    </button>
                    <button onclick="window.openUploadModal()" class="flex items-center gap-2 px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg font-bold text-xs uppercase shadow-lg transition">
                        <i data-lucide="upload-cloud" class="w-4 h-4"></i> <span class="hidden sm:inline">Tải file lên</span>
                    </button>
                </div>
            </div>
            
            <!-- File Container -->
            <div id="file-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <!-- Items render by JS -->
            </div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                <i data-lucide="folder-open" class="w-16 h-16 mb-4 opacity-50"></i>
                <p class="font-medium">Thư mục này trống.</p>
            </div>
             <div id="login-prompt" class="flex flex-col items-center justify-center py-20 text-slate-400">
                <i data-lucide="log-in" class="w-16 h-16 mb-4 opacity-50"></i>
                <p class="font-medium">Vui lòng đăng nhập để xem các tệp của bạn.</p>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Upload Modal -->
    <div id="modal-upload" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[300] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden border dark:border-white/10">
            <div class="p-5 border-b dark:border-white/5 flex justify-between items-center">
                <h3 class="font-bold uppercase text-sm tracking-widest">Tải lên File</h3>
                <button onclick="window.closeModal('modal-upload')" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="upload-form" class="p-6 space-y-4">
                <div class="border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-6 text-center">
                    <input type="file" id="file-input" required>
                </div>
                <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-bold shadow-lg uppercase text-xs hover:bg-blue-600 transition">Xác nhận Tải lên</button>
            </form>
        </div>
    </div>
    
    <!-- Create Folder Modal -->
    <div id="modal-create-folder" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[300] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden border dark:border-white/10">
            <div class="p-5 border-b dark:border-white/5 flex justify-between items-center">
                <h3 class="font-bold uppercase text-sm tracking-widest">Tạo thư mục mới</h3>
                <button onclick="window.closeModal('modal-create-folder')" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="create-folder-form" class="p-6 space-y-4">
                <input type="text" id="folder-name-input" required placeholder="Nhập tên thư mục..." class="w-full px-4 py-2.5 bg-slate-50 dark:bg-white/5 rounded-xl text-sm font-medium outline-none focus:ring-2 ring-primary">
                <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-bold shadow-lg uppercase text-xs hover:bg-blue-600 transition">Tạo thư mục</button>
            </form>
        </div>
    </div>
    
    <!-- Preview Modal -->
    <div id="modal-preview" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[800] hidden flex flex-col p-4 sm:p-6">
        <div class="flex justify-between items-center mb-4 text-white">
            <h3 id="preview-title" class="font-bold truncate max-w-[80%] text-lg">Xem trước</h3>
            <button onclick="window.closeModal('modal-preview')" class="p-2 bg-white/10 hover:bg-white/20 rounded-full transition"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="preview-content" class="flex-1 bg-black flex items-center justify-center rounded-xl overflow-hidden shadow-2xl relative">
             <!-- Content will be injected here -->
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 z-[500] translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-bold text-sm">
            <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>
            <span id="toast-msg">Thông báo</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // --- CẤU HÌNH FIREBASE ---
        // !!! QUAN TRỌNG: Dán cấu hình Firebase của bạn vào đây
        const firebaseConfig = {
            apiKey: "AIzaSyCLCcgaoW9gNYhKk0c0gDWC6i5mKVTN4XE",
            authDomain: "profile-d1214.firebaseapp.com",
            projectId: "profile-d1214",
            storageBucket: "profile-d1214.firebasestorage.app",
            messagingSenderId: "914980131889",
            appId: "1:914980131889:web:72f8da15c42dbee671b110"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // --- GLOBAL STATE ---
        let currentUser = null;
        let currentFolderId = 'root';
        let path = [{ id: 'root', name: 'Trang chủ' }];
        let unsubscribeFolders = null;
        let unsubscribeFiles = null;

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            renderAuthUI();
            if (user) {
                document.getElementById('login-prompt').classList.add('hidden');
                document.getElementById('main-actions').classList.remove('hidden');
                navigateToFolder('root'); // Start at root
                renderFolderTree();
            } else {
                document.getElementById('login-prompt').classList.remove('hidden');
                document.getElementById('main-actions').classList.add('hidden');
                document.getElementById('file-container').innerHTML = '';
                document.getElementById('folder-tree-container').innerHTML = '';
                if(unsubscribeFiles) unsubscribeFiles();
                if(unsubscribeFolders) unsubscribeFolders();
            }
        });

        function renderAuthUI() {
            const container = document.getElementById('auth-section');
            if (currentUser) {
                container.innerHTML = `<div class="flex items-center gap-2 bg-white dark:bg-slate-800 p-1 pr-3 rounded-xl border dark:border-white/10 shadow-sm cursor-pointer" onclick="window.logout()">
                    <img src="${currentUser.photoURL}" class="w-8 h-8 rounded-lg">
                    <p class="text-xs font-bold leading-none truncate max-w-[100px] hidden sm:block">${currentUser.displayName}</p>
                    <i data-lucide="log-out" class="w-4 h-4 text-red-500 ml-1"></i></div>`;
            } else {
                container.innerHTML = `<button onclick="window.login()" class="px-5 py-2 bg-primary text-white rounded-xl font-bold text-xs uppercase shadow-lg hover:bg-blue-600 transition">Đăng nhập</button>`;
            }
            lucide.createIcons();
        }
        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        // --- CORE FILE/FOLDER LOGIC ---
        function renderItems(folders = [], files = []) {
            const container = document.getElementById('file-container');
            const emptyState = document.getElementById('empty-state');
            
            if (folders.length === 0 && files.length === 0) {
                emptyState.classList.remove('hidden');
                container.innerHTML = '';
            } else {
                emptyState.classList.add('hidden');
                const folderHtml = folders.map(f => `
                    <div class="group flex items-center p-3 rounded-lg bg-white dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-slate-700/50 cursor-pointer border dark:border-white/5" ondblclick="window.navigateToFolder('${f.id}', '${f.name}')">
                        <i data-lucide="folder" class="w-6 h-6 text-yellow-500 mr-3"></i>
                        <span class="flex-1 font-bold text-sm truncate">${f.name}</span>
                        <button onclick="event.stopPropagation(); window.deleteFolder('${f.id}', '${f.name}')" class="p-1 opacity-0 group-hover:opacity-100 text-red-500 hover:bg-red-100 dark:hover:bg-slate-600 rounded-md"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`).join('');

                const fileHtml = files.map(f => {
                    const fileExt = f.name.split('.').pop().toLowerCase();
                    let icon = '<i data-lucide="file" class="w-10 h-10 text-slate-400"></i>';
                    
                    if(['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExt)){
                        icon = `<img src="${f.downloadURL}" class="w-full h-24 object-cover rounded-t-lg">`
                    } else if (['mp4', 'webm', 'mov'].includes(fileExt)) {
                        icon = '<i data-lucide="video" class="w-10 h-10 text-red-500"></i>';
                    } else if (['mp3', 'wav', 'ogg'].includes(fileExt)) {
                        icon = '<i data-lucide="music" class="w-10 h-10 text-sky-500"></i>';
                    } else if (['pdf'].includes(fileExt)) {
                        icon = '<i data-lucide="file-text" class="w-10 h-10 text-red-600"></i>';
                    }

                    return `
                    <div class="group bg-white dark:bg-slate-800 rounded-lg border dark:border-white/5 overflow-hidden shadow-sm hover:shadow-lg transition-shadow">
                        <div class="h-24 flex items-center justify-center bg-slate-50 dark:bg-slate-700/50">${icon}</div>
                        <div class="p-3">
                            <p class="font-bold text-sm truncate" title="${f.name}">${f.name}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-xs text-slate-400">${(f.size / 1024).toFixed(1)} KB</span>
                                <div class="flex items-center gap-1">
                                    <button onclick="window.previewFile('${f.downloadURL}', '${f.fileType}', '${f.name}')" class="p-1 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-600 rounded-md"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                    <a href="${f.downloadURL}" target="_blank" class="p-1 text-blue-500 hover:bg-blue-100 dark:hover:bg-slate-600 rounded-md"><i data-lucide="download" class="w-4 h-4"></i></a>
                                    <button onclick="window.deleteFile('${f.id}', '${f.storagePath}')" class="p-1 text-red-500 hover:bg-red-100 dark:hover:bg-slate-600 rounded-md"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>`
                }).join('');
                container.innerHTML = folderHtml + fileHtml;
            }
            lucide.createIcons();
        }

        window.navigateToFolder = (folderId, folderName) => {
            if (folderId === currentFolderId) return;

            // Update path
            const existingIndex = path.findIndex(p => p.id === folderId);
            if (existingIndex > -1) {
                path = path.slice(0, existingIndex + 1);
            } else {
                path.push({ id: folderId, name: folderName });
            }
            
            currentFolderId = folderId;
            renderBreadcrumbs();
            
            // Unsubscribe from old listeners
            if (unsubscribeFolders) unsubscribeFolders();
            if (unsubscribeFiles) unsubscribeFiles();

            // Setup new listeners
            const foldersQuery = query(collection(db, 'folders'), where('parentId', '==', currentFolderId), where('ownerId', '==', currentUser.uid));
            const filesQuery = query(collection(db, 'files'), where('parentId', '==', currentFolderId), where('ownerId', '==', currentUser.uid));

            let foldersData = [];
            let filesData = [];

            unsubscribeFolders = onSnapshot(foldersQuery, (snapshot) => {
                foldersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(foldersData, filesData);
            });
            unsubscribeFiles = onSnapshot(filesQuery, (snapshot) => {
                filesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems(foldersData, filesData);
            });
            
            // Highlight active folder in tree
            document.querySelectorAll('#folder-tree .folder-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`#folder-tree .folder-item[data-id="${folderId}"]`);
            if(activeEl) activeEl.classList.add('active');

        }
        
        async function renderFolderTree() {
            if (!currentUser) return;
            const q = query(collection(db, 'folders'), where('ownerId', '==', currentUser.uid), orderBy('name'));
            onSnapshot(q, (snapshot) => {
                const allFolders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const tree = buildTree(allFolders);
                document.getElementById('folder-tree-container').innerHTML = generateTreeHtml(tree);
                // Re-apply active class after re-render
                 const activeEl = document.querySelector(`#folder-tree .folder-item[data-id="${currentFolderId}"]`);
                 if(activeEl) activeEl.classList.add('active');
            });
        }
        
        function buildTree(folders, parentId = 'root') {
            return folders
                .filter(folder => folder.parentId === parentId)
                .map(folder => ({ ...folder, children: buildTree(folders, folder.id) }));
        }

        function generateTreeHtml(nodes) {
            let html = `<ul>`;
            if(nodes.length === 0 && currentFolderId === 'root') return '<ul><li><div class="folder-item active" data-id="root" onclick="window.navigateToFolder(\'root\', \'Trang chủ\')">Trang chủ</div></li></ul>';
            
            // Always add Home/Root
             html += `<li><div class="folder-item ${currentFolderId === 'root' ? 'active' : ''}" data-id="root" onclick="window.navigateToFolder('root', 'Trang chủ')">Trang chủ</div>`;

            nodes.forEach(node => {
                html += `<li><div class="folder-item" data-id="${node.id}" onclick="window.navigateToFolder('${node.id}', '${node.name}')">${node.name}</div>`;
                if (node.children && node.children.length > 0) {
                    html += generateTreeHtml(node.children);
                }
                html += `</li>`;
            });
            html += `</ul>`;
            return html;
        }

        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = path.map((p, i) => {
                if (i === path.length - 1) {
                    return `<span class="font-bold text-slate-800 dark:text-white">${p.name}</span>`;
                }
                return `<span class="cursor-pointer hover:underline" onclick="window.navigateToFolder('${p.id}', '${p.name}')">${p.name}</span> <i data-lucide="chevron-right" class="w-4 h-4"></i>`;
            }).join('');
            lucide.createIcons();
        }

        // --- ACTIONS (CREATE, DELETE) ---
        document.getElementById('create-folder-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('folder-name-input');
            const folderName = input.value.trim();
            if (!folderName) return;

            setLoading(true, 'Đang tạo thư mục...');
            try {
                await addDoc(collection(db, 'folders'), {
                    name: folderName,
                    parentId: currentFolderId,
                    ownerId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                input.value = '';
                closeModal('modal-create-folder');
                showToast('Đã tạo thư mục thành công!');
            } catch (error) {
                showToast('Lỗi: ' + error.message, true);
            } finally {
                setLoading(false);
            }
        };

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('file-input');
            if (fileInput.files.length === 0) {
                showToast('Vui lòng chọn một file!', true);
                return;
            }
            const file = fileInput.files[0];
            const storagePath = `files/${currentUser.uid}/${Date.now()}_${file.name}`;
            const storageRef = ref(storage, storagePath);

            setLoading(true, 'Đang tải file lên...');
            try {
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);

                await addDoc(collection(db, 'files'), {
                    name: file.name,
                    parentId: currentFolderId,
                    ownerId: currentUser.uid,
                    storagePath: storagePath,
                    downloadURL: downloadURL,
                    fileType: file.type,
                    size: file.size,
                    createdAt: serverTimestamp()
                });

                fileInput.value = '';
                closeModal('modal-upload');
                showToast('Tải file lên thành công!');
            } catch (error) {
                showToast('Lỗi: ' + error.message, true);
            } finally {
                setLoading(false);
            }
        };

        window.deleteFile = async (docId, storagePath) => {
            if (!confirm('Bạn có chắc chắn muốn xóa file này không?')) return;
            setLoading(true, 'Đang xóa file...');
            try {
                // Delete from Storage
                const fileRef = ref(storage, storagePath);
                await deleteObject(fileRef);
                // Delete from Firestore
                await deleteDoc(doc(db, 'files', docId));
                showToast('Đã xóa file.');
            } catch (error) {
                 showToast('Lỗi: ' + error.message, true);
            } finally {
                setLoading(false);
            }
        }
        
        window.deleteFolder = async (folderId, folderName) => {
            // Cảnh báo: Việc xóa thư mục đệ quy phức tạp.
            // Giải pháp an toàn nhất là chỉ cho phép xóa thư mục rỗng.
            // Để làm điều đó, bạn cần kiểm tra xem có file/thư mục con nào không trước khi xóa.
            // Hoặc, sử dụng Cloud Function để xử lý xóa đệ quy ở backend.
            
            if (!confirm(`Bạn có chắc chắn muốn xóa thư mục "${folderName}" không? Thao tác này KHÔNG thể hoàn tác và hiện tại chỉ xóa được thư mục rỗng.`)) return;

             setLoading(true, 'Đang xóa thư mục...');
            try {
                // Check if folder is empty (simple check)
                 const folderChildrenQuery = query(collection(db, 'folders'), where('parentId', '==', folderId));
                 const fileChildrenQuery = query(collection(db, 'files'), where('parentId', '==', folderId));
                 // For a real app, you would use getDocs and check if snapshots are empty
                 // For this demo, we'll proceed with deletion and let Firestore rules handle security.

                await deleteDoc(doc(db, 'folders', folderId));
                showToast('Đã xóa thư mục.');
                // If the currently viewed folder is the one deleted, navigate up
                if(currentFolderId === folderId){
                    navigateToFolder('root');
                }
            } catch (error) {
                 showToast('Lỗi: ' + error.message, true);
            } finally {
                setLoading(false);
            }
        }

        // --- PREVIEW LOGIC ---
        window.previewFile = (url, type, name) => {
            const modal = document.getElementById('modal-preview');
            const title = document.getElementById('preview-title');
            const content = document.getElementById('preview-content');

            title.innerText = name;
            let previewHtml = '';

            if(type.startsWith('image/')) {
                previewHtml = `<img src="${url}" class="max-h-full max-w-full object-contain">`;
            } else if (type.startsWith('video/')) {
                previewHtml = `<video src="${url}" controls class="max-h-full max-w-full"></video>`;
            } else if (type.startsWith('audio/')) {
                previewHtml = `<audio src="${url}" controls></audio>`;
            } else if (type === 'application/pdf') {
                 previewHtml = `<iframe src="${url}" class="w-full h-full border-none"></iframe>`;
            } else {
                 previewHtml = `<div class="text-center text-white p-8">
                    <i data-lucide="file-warning" class="w-24 h-24 mx-auto mb-4"></i>
                    <p class="font-bold mb-2">Không hỗ trợ xem trước cho loại file này.</p>
                    <a href="${url}" target="_blank" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-bold">Tải xuống để xem</a>
                 </div>`;
            }
            content.innerHTML = previewHtml;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        // --- UI UTILS ---
        window.toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };
        window.openUploadModal = () => document.getElementById('modal-upload').classList.remove('hidden');
        window.openCreateFolderModal = () => document.getElementById('modal-create-folder').classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            icon.setAttribute('data-lucide', isError ? 'alert-triangle' : 'check-circle');
            icon.classList.toggle('text-red-500', isError);
            icon.classList.toggle('text-green-500', !isError);
            lucide.createIcons();
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        function setLoading(active, text = "Đang xử lý...") {
            const l = document.getElementById('global-loading');
            document.getElementById('loading-text').innerText = text;
            active ? l.classList.remove('opacity-0', 'pointer-events-none') : l.classList.add('opacity-0', 'pointer-events-none');
        }

        // --- INITIAL LOAD ---
        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
        lucide.createIcons();
    </script>
</body>
</html>
