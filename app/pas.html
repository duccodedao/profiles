<!DOCTYPE html>
<html lang="vi" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Quản Lý Mật Khẩu Nâng Cao</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-icons@0.378.0/dist/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #2d3748; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #555; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 font-sans">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 flex items-center justify-center flex-col opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
        <p id="loading-message" class="mt-4 text-white text-lg">Đang tải...</p>
        <button id="retry-button" class="hidden mt-4 px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow-md">Thử Lại</button>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/70 dark:bg-gray-800/70 backdrop-blur-lg shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <i data-lucide="shield-check"></i>
                <span>Password Manager</span>
            </h1>
            <div class="flex items-center gap-3">
                <button id="theme-toggle-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i id="theme-icon-sun" data-lucide="sun" class="text-yellow-500"></i>
                    <i id="theme-icon-moon" data-lucide="moon" class="text-gray-300 hidden"></i>
                </button>
                <div id="auth-container"></div>
            </div>
        </div>
    </header>

    <main id="main-content" class="container mx-auto p-4 md:p-6 animate-fade-in"></main>

    <!-- Modal Add/Edit -->
    <div id="form-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-md transform transition-all opacity-0 scale-95" id="modal-content">
            <div class="flex justify-between items-center p-4 border-b dark:border-gray-700">
                <h3 id="modal-title" class="text-lg font-bold">Thêm Tài Khoản Mới</h3>
                <button id="close-modal-btn" class="p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600"><i data-lucide="x"></i></button>
            </div>
            <form id="password-form" class="p-6 space-y-4">
                <input type="hidden" id="entry-id">
                <div>
                    <label for="website-url" class="block text-sm font-medium mb-1">URL Website</label>
                    <div class="relative"><i data-lucide="globe" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i><input type="url" id="website-url" placeholder="https://www.example.com" required class="w-full pl-10 pr-4 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                </div>
                <div>
                    <label for="username" class="block text-sm font-medium mb-1">Tài khoản</label>
                     <div class="relative"><i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i><input type="text" id="username" required class="w-full pl-10 pr-4 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium mb-1">Mật khẩu</label>
                    <div class="relative">
                        <i data-lucide="key-round" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="password" required class="w-full pl-10 pr-10 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="button" id="toggle-password-visibility" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500"><i data-lucide="eye" class="w-5 h-5"></i></button>
                    </div>
                </div>
                <div class="flex justify-end pt-4">
                    <button type="submit" id="save-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i data-lucide="save"></i> Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPT SECTION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, writeBatch, serverTimestamp, getDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ===================================================================================
        // CẤU HÌNH FIREBASE VÀ QUẢN TRỊ VIÊN - BẮT BUỘC THAY ĐỔI
        // ===================================================================================
     const firebaseConfig = {
        apiKey: "AIzaSyCLCcgaoW9gNYhKk0c0gDWC6i5mKVTN4XE",
        authDomain: "profile-d1214.firebaseapp.com",
        projectId: "profile-d1214",
        storageBucket: "profile-d1214.firebasestorage.app",
        messagingSenderId: "914980131889",
        appId: "1:914980131889:web:72f8da15c42dbee671b110",
        measurementId: "G-C587M69LZW"
    };

        
        // !! QUAN TRỌNG: Thay đổi UID này thành UID của bạn.
        // Đây là Quản trị viên cấp cao nhất, không thể bị xóa khỏi giao diện.
        // Cách lấy UID: Đăng nhập vào trang web lần đầu, vào Console của trình duyệt (F12) và tìm dòng "User UID:".
        const MASTER_ADMIN_UID = "REPLACE_WITH_YOUR_FIREBASE_USER_ID";
        
        /*
            // >>>>>>>>>>>> ĐỀ XUẤT CẬP NHẬT FIRESTORE SECURITY RULES <<<<<<<<<<<<
            // Dán nội dung này vào tab Rules của Firestore trên trang web Firebase
            rules_version = '2';
            service cloud.firestore {
              match /databases/{database}/documents {
                // Chỉ admin mới được đọc/ghi danh sách admin
                match /_config_/_admins_ {
                    allow read: if request.auth != null;
                    allow write: if request.auth.uid in get(path(' _config_/_admins_')).data.uids || request.auth.uid == "REPLACE_WITH_YOUR_MASTER_ADMIN_UID_HERE";
                }
                
                // Chỉ admin mới được đọc/ghi mật khẩu
                match /passwords/{docId} {
                  allow read, write, update, delete: if request.auth.uid in get(/databases/$(database)/documents/_config_/_admins_).data.uids || request.auth.uid == "REPLACE_WITH_YOUR_MASTER_ADMIN_UID_HERE";
                }
              }
            }
        */

        // ===================================================================================
        // KHỞI TẠO ỨNG DỤNG
        // ===================================================================================
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const passwordsCollection = collection(db, 'passwords');
        const adminConfigDoc = doc(db, '_config_', '_admins_');

        // ===================================================================================
        // BIẾN TRẠNG THÁI
        // ===================================================================================
        let currentUser = null;
        let isAdmin = false;
        let allPasswords = [];
        let adminUIDs = [];
        let unsubscribePasswords = null;
        let unsubscribeAdmins = null;
        let loadingTimeout;
        let currentPage = 1;
        const ITEMS_PER_PAGE = 10;
        
        // ===================================================================================
        // CÁC HÀM TIỆN ÍCH
        // ===================================================================================
        const showToast = (icon, title) => {
            Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true, icon, title, didOpen: (toast) => { toast.onmouseenter = Swal.stopTimer; toast.onmouseleave = Swal.resumeTimer; }});
        };

        const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text)
                .then(() => showToast('success', 'Đã sao chép!'))
                .catch(() => showToast('error', 'Sao chép thất bại!'));
        };
        
        const getFaviconUrl = (url) => {
            try {
                return `https://www.google.com/s2/favicons?sz=32&domain=${new URL(url).hostname}`;
            } catch {
                return 'https://www.google.com/s2/favicons?sz=32&domain=example.com';
            }
        };
        
        const toggleLoading = (show, message = 'Đang tải...', isError = false) => {
            clearTimeout(loadingTimeout);
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-message').textContent = message;
            document.getElementById('retry-button').classList.toggle('hidden', !isError);
            if (show) overlay.classList.remove('opacity-0', 'pointer-events-none');
            else overlay.classList.add('opacity-0', 'pointer-events-none');
        };

        // ===================================================================================
        // QUẢN LÝ GIAO DIỆN (UI)
        // ===================================================================================
        const renderMainUI = () => {
            const mainContent = document.getElementById('main-content');
            if (!currentUser) {
                mainContent.innerHTML = `
                    <div class="text-center p-8 md:p-16 bg-white dark:bg-gray-800 rounded-lg shadow-lg animate-fade-in">
                        <div class="flex justify-center mb-6"><i data-lucide="shield-check" class="w-24 h-24 text-blue-500"></i></div>
                        <h2 class="text-3xl font-bold mb-2 text-gray-900 dark:text-white">Chào mừng đến với Trình Quản Lý Mật Khẩu</h2>
                        <p class="text-lg text-gray-600 dark:text-gray-300 mb-8">An toàn, bảo mật và chỉ dành cho người được cấp quyền.</p>
                        <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg flex items-center gap-2 mx-auto text-lg transition-transform transform hover:scale-105">
                            <i data-lucide="log-in"></i> Đăng Nhập Với Google
                        </button>
                    </div>`;
            } else if (!isAdmin) {
                 mainContent.innerHTML = `
                    <div class="text-center p-8 md:p-16 bg-white dark:bg-gray-800 rounded-lg shadow-lg animate-fade-in">
                        <div class="flex justify-center mb-6"><i data-lucide="user-x" class="w-24 h-24 text-red-500"></i></div>
                        <h2 class="text-3xl font-bold mb-2 text-gray-900 dark:text-white">Truy Cập Bị Từ Chối</h2>
                        <p class="text-lg text-gray-600 dark:text-gray-300">Bạn không có quyền truy cập vào tài nguyên này. Vui lòng liên hệ quản trị viên.</p>
                    </div>`;
            } else {
                 mainContent.innerHTML = `
                    <!-- Admin Panel -->
                    <div id="admin-panel" class="mb-6 p-4 bg-white dark:bg-gray-800 rounded-lg shadow-lg">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="shield-plus"></i>Quản Lý Admin</h3>
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="flex-grow">
                                <label for="new-admin-uid" class="block text-sm font-medium mb-1">Thêm Admin mới bằng UID</label>
                                <div class="flex gap-2">
                                    <input type="text" id="new-admin-uid" placeholder="Nhập UID của người dùng..." class="flex-grow px-3 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <button id="add-admin-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i data-lucide="plus"></i> Thêm</button>
                                </div>
                            </div>
                            <div class="flex-grow">
                                <label class="block text-sm font-medium mb-1">Danh sách Admin hiện tại</label>
                                <div id="admin-list" class="p-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:border-gray-600 min-h-[42px] max-h-32 overflow-y-auto"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Controls -->
                    <div id="controls-area" class="mb-6 p-4 bg-white dark:bg-gray-800 rounded-lg shadow-lg flex flex-wrap items-center justify-between gap-4">
                        <div class="relative flex-grow max-w-lg">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="text" id="search-input" placeholder="Tìm kiếm theo website hoặc tài khoản..." class="w-full pl-10 pr-4 py-2 border rounded-lg bg-white dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <button id="add-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i data-lucide="plus-circle"></i> Thêm Mới</button>
                            <button id="import-btn" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i data-lucide="file-up"></i> Nhập</button>
                            <input type="file" id="import-file-input" class="hidden" accept=".xlsx, .xls">
                            <button id="download-template-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i data-lucide="sheet"></i> Tải Mẫu</button>
                            <button id="export-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i data-lucide="file-down"></i> Xuất</button>
                        </div>
                    </div>

                    <!-- Data Table -->
                    <div id="data-table-container" class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                                <thead class="bg-gray-50 dark:bg-gray-700">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Website</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Tài khoản</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Mật khẩu</th>
                                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 dark:text-gray-300 uppercase">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="password-table-body" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                            </table>
                        </div>
                        <div id="empty-state" class="text-center p-16 hidden">
                             <i data-lucide="cloud-off" class="mx-auto h-16 w-16 text-gray-400"></i>
                             <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">Không có dữ liệu</h3>
                             <p class="mt-1 text-sm text-gray-500">Bắt đầu bằng cách thêm một tài khoản mới.</p>
                        </div>
                    </div>
                    <div id="pagination-controls" class="mt-4 flex justify-center items-center gap-2"></div>
                `;
                // Re-bind listeners for the newly created elements
                bindAdminAndDataListeners();
                fetchAndRenderPasswords();
                fetchAndRenderAdmins();
            }
            lucide.createIcons();
        };

        const updateAuthPill = (user) => {
            const authContainer = document.getElementById('auth-container');
            if (user) {
                authContainer.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                           <div class="text-sm font-medium text-gray-900 dark:text-white">${user.displayName}</div>
                           <div class="text-xs text-gray-500 dark:text-gray-400">${isAdmin ? 'Admin' : 'User'}</div>
                        </div>
                        <img src="${user.photoURL}" alt="${user.displayName}" class="w-10 h-10 rounded-full">
                        <button id="logout-btn" class="p-2 rounded-full text-red-500 hover:bg-red-100 dark:hover:bg-gray-700"><i data-lucide="log-out"></i></button>
                    </div>`;
            } else {
                authContainer.innerHTML = '';
            }
            lucide.createIcons();
        };
        
        const renderTable = (passwordsToRender) => {
            const tableBody = document.getElementById('password-table-body');
            const emptyState = document.getElementById('empty-state');
            tableBody.innerHTML = '';
            
            if (passwordsToRender.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            const paginatedItems = passwordsToRender.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

            paginatedItems.forEach(entry => {
                const passwordDisplay = entry.showPassword ? entry.password : '••••••••';
                const eyeIcon = entry.showPassword ? 'eye-off' : 'eye';
                const row = `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center"><img class="h-8 w-8 mr-3" src="${getFaviconUrl(entry.websiteUrl)}" alt="favicon"><a href="${entry.websiteUrl}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:underline">${entry.websiteUrl}</a></div></td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center gap-2"><span class="text-sm">${entry.username}</span><button class="copy-btn" data-text="${entry.username}"><i data-lucide="copy" class="w-4 h-4 text-gray-500 hover:text-blue-500"></i></button></div></td>
                        <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center gap-2"><span class="text-sm font-mono">${passwordDisplay}</span><button class="copy-btn" data-text="${entry.password}"><i data-lucide="copy" class="w-4 h-4 text-gray-500 hover:text-blue-500"></i></button><button class="toggle-password-table" data-id="${entry.id}"><i data-lucide="${eyeIcon}" class="w-4 h-4 text-gray-500 hover:text-blue-500"></i></button></div></td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium"><div class="flex justify-center items-center gap-2"><button class="edit-btn text-yellow-500 hover:text-yellow-700" data-id="${entry.id}"><i data-lucide="file-pen-line"></i></button><button class="delete-btn text-red-500 hover:text-red-700" data-id="${entry.id}"><i data-lucide="trash-2"></i></button></div></td>
                    </tr>`;
                tableBody.innerHTML += row;
            });
            lucide.createIcons();
            renderPagination(passwordsToRender.length);
        };
        
        const renderPagination = (totalItems) => {
            const paginationControls = document.getElementById('pagination-controls');
            if(!paginationControls) return;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            paginationControls.innerHTML = '';
            if(totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = `px-3 py-1 rounded-md text-sm ${currentPage === i ? 'bg-blue-600 text-white' : 'bg-white dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600'}`;
                button.onclick = () => { currentPage = i; filterAndRender(); };
                paginationControls.appendChild(button);
            }
        };
        
        const renderAdminList = () => {
            const adminListDiv = document.getElementById('admin-list');
            if(!adminListDiv) return;
            adminListDiv.innerHTML = '';
            adminUIDs.forEach(uid => {
                const isMaster = uid === MASTER_ADMIN_UID;
                const pill = document.createElement('div');
                pill.className = `inline-flex items-center gap-2 ${isMaster ? 'bg-yellow-200 text-yellow-800' : 'bg-blue-200 text-blue-800'} text-xs font-semibold mr-2 mb-2 px-2.5 py-1 rounded-full`;
                pill.innerHTML = `
                    <span title="${uid}">${uid.substring(0, 10)}...</span>
                    ${isMaster ? '<i data-lucide="star" class="w-3 h-3 text-yellow-600" title="Master Admin"></i>' : `<button class="remove-admin-btn" data-uid="${uid}"><i data-lucide="x" class="w-3 h-3 text-red-500 hover:text-red-700"></i></button>`}
                `;
                adminListDiv.appendChild(pill);
            });
             lucide.createIcons();
        };

        const filterAndRender = () => {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = allPasswords.filter(p => p.websiteUrl.toLowerCase().includes(searchTerm) || p.username.toLowerCase().includes(searchTerm));
            renderTable(filtered);
        };

        // ===================================================================================
        // LOGIC MODAL
        // ===================================================================================
        const openModal = (entry = null) => {
            const form = document.getElementById('password-form');
            form.reset();
            document.getElementById('entry-id').value = '';
            if (entry) {
                document.getElementById('modal-title').textContent = 'Chỉnh Sửa Tài Khoản';
                document.getElementById('entry-id').value = entry.id;
                document.getElementById('website-url').value = entry.websiteUrl;
                document.getElementById('username').value = entry.username;
                document.getElementById('password').value = entry.password;
            } else {
                document.getElementById('modal-title').textContent = 'Thêm Tài Khoản Mới';
            }
            document.getElementById('form-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('modal-content').classList.remove('opacity-0', 'scale-95'); }, 10);
        };

        const closeModal = () => {
            document.getElementById('modal-content').classList.add('opacity-0', 'scale-95');
            setTimeout(() => { document.getElementById('form-modal').classList.add('hidden'); }, 300);
        };

        // ===================================================================================
        // FIREBASE INTERACTION
        // ===================================================================================
        const handleGoogleLogin = () => signInWithPopup(auth, provider).catch(error => showToast('error', `Đăng nhập thất bại: ${error.message}`));
        const handleLogout = () => signOut(auth).catch(error => showToast('error', 'Đăng xuất thất bại'));
        
        const checkAdminStatus = async (user) => {
            if (!user) return false;
            if (user.uid === MASTER_ADMIN_UID) return true;
            try {
                const docSnap = await getDoc(adminConfigDoc);
                if (docSnap.exists()) {
                    const uids = docSnap.data().uids || [];
                    return uids.includes(user.uid);
                } else { // If config doesn't exist, create it with master admin
                    await setDoc(adminConfigDoc, { uids: [MASTER_ADMIN_UID] });
                    return user.uid === MASTER_ADMIN_UID;
                }
            } catch (error) {
                console.error("Error checking admin status:", error);
                return false;
            }
        };
        
        const fetchAndRenderPasswords = () => {
            if (!isAdmin) return;
            toggleLoading(true, 'Đang tải dữ liệu...');
            loadingTimeout = setTimeout(() => toggleLoading(true, 'Quá trình tải quá lâu.', true), 15000);
            if (unsubscribePasswords) unsubscribePasswords();
            unsubscribePasswords = onSnapshot(passwordsCollection, (snapshot) => {
                allPasswords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                currentPage = 1;
                filterAndRender();
                toggleLoading(false);
            }, (error) => {
                console.error("Lỗi khi lấy dữ liệu: ", error);
                toggleLoading(true, `Lỗi: ${error.message}`, true);
            });
        };

        const fetchAndRenderAdmins = () => {
            if (!isAdmin) return;
            if (unsubscribeAdmins) unsubscribeAdmins();
            unsubscribeAdmins = onSnapshot(adminConfigDoc, (docSnap) => {
                if(docSnap.exists()){
                    adminUIDs = docSnap.data().uids || [];
                    renderAdminList();
                }
            });
        };

        const handleFormSubmit = async (event) => {
            event.preventDefault();
            const id = document.getElementById('entry-id').value;
            const data = {
                websiteUrl: document.getElementById('website-url').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            };

            try {
                if (id) {
                    await updateDoc(doc(db, 'passwords', id), data);
                    showToast('success', 'Cập nhật thành công!');
                } else {
                    await addDoc(passwordsCollection, {...data, createdAt: serverTimestamp()});
                    showToast('success', 'Thêm mới thành công!');
                }
                closeModal();
            } catch (error) { showToast('error', `Lưu thất bại: ${error.message}`); }
        };

        const handleDelete = (id) => {
            Swal.fire({ title: 'Bạn chắc chắn muốn xóa?', text: "Hành động này không thể hoàn tác!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'Vâng, xóa nó!', cancelButtonText: 'Hủy' }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await deleteDoc(doc(db, 'passwords', id));
                        showToast('success', 'Đã xóa thành công.');
                    } catch (error) { showToast('error', `Xóa thất bại: ${error.message}`); }
                }
            })
        };
        
        const addAdmin = async () => {
            const uidInput = document.getElementById('new-admin-uid');
            const newUid = uidInput.value.trim();
            if(!newUid) return showToast('warning', 'Vui lòng nhập UID.');
            try {
                await updateDoc(adminConfigDoc, { uids: arrayUnion(newUid) });
                showToast('success', 'Đã thêm Admin thành công.');
                uidInput.value = '';
            } catch (error) { showToast('error', `Thêm thất bại: ${error.message}`); }
        };

        const removeAdmin = async (uid) => {
            if(uid === MASTER_ADMIN_UID) return showToast('error', 'Không thể xóa Master Admin.');
            try {
                await updateDoc(adminConfigDoc, { uids: arrayRemove(uid) });
                showToast('success', 'Đã xóa quyền Admin.');
            } catch (error) { showToast('error', `Xóa thất bại: ${error.message}`); }
        };
        
        // ===================================================================================
        // TÍNH NĂNG NÂNG CAO (EXCEL)
        // ===================================================================================
        const exportToExcel = () => {
            const dataToExport = allPasswords.map(({ websiteUrl, username, password }) => ({ Website: websiteUrl, Username: username, Password: password }));
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Passwords");
            XLSX.writeFile(wb, "passwords_export.xlsx");
            showToast('success', 'Đã xuất dữ liệu ra file Excel.');
        };
        
        const downloadTemplate = () => {
            const templateData = [{ Website: "https://www.example.com", Username: "user@example.com", Password: "your_password_here" }];
            const ws = XLSX.utils.json_to_sheet(templateData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "import_template.xlsx");
        };

        const importFromExcel = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    if (json.length === 0) return showToast('warning', 'File Excel trống hoặc không hợp lệ.');
                    
                    const batch = writeBatch(db);
                    let count = 0;
                    json.forEach(row => {
                        if (row.Website && row.Username && row.Password) {
                            batch.set(doc(passwordsCollection), { websiteUrl: String(row.Website), username: String(row.Username), password: String(row.Password), createdAt: serverTimestamp() });
                            count++;
                        }
                    });

                    if (count > 0) {
                        await batch.commit();
                        showToast('success', `Đã nhập thành công ${count} mục.`);
                    } else {
                        showToast('error', 'Không tìm thấy dữ liệu hợp lệ. Cần có các cột "Website", "Username", "Password".');
                    }
                } catch (error) { showToast('error', `Nhập thất bại: ${error.message}`); }
                 finally { event.target.value = ''; }
            };
            reader.readAsArrayBuffer(file);
        };
        
        // ===================================================================================
        // THEME & EVENT LISTENERS
        // ===================================================================================
        const applyTheme = (theme) => {
            document.documentElement.classList.toggle('dark', theme === 'dark');
            document.getElementById('theme-icon-sun').classList.toggle('hidden', theme === 'dark');
            document.getElementById('theme-icon-moon').classList.toggle('hidden', theme !== 'dark');
        };

        const toggleTheme = () => {
            const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        };
        
        const bindGlobalListeners = () => {
            document.getElementById('theme-toggle-btn').addEventListener('click', toggleTheme);
            document.body.addEventListener('click', (e) => {
                if (e.target.closest('#login-btn')) handleGoogleLogin();
                if (e.target.closest('#logout-btn')) handleLogout();
            });
            document.getElementById('close-modal-btn').addEventListener('click', closeModal);
            document.getElementById('form-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
            document.getElementById('password-form').addEventListener('submit', handleFormSubmit);
            document.getElementById('toggle-password-visibility').addEventListener('click', (e) => {
                 const passwordInput = document.getElementById('password');
                 const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                 passwordInput.setAttribute('type', type);
                 e.currentTarget.innerHTML = type === 'password' ? '<i data-lucide="eye"></i>' : '<i data-lucide="eye-off"></i>';
                 lucide.createIcons();
            });
        };
        
        const bindAdminAndDataListeners = () => {
            const searchInput = document.getElementById('search-input');
            const tableBody = document.getElementById('password-table-body');
            const importFileInput = document.getElementById('import-file-input');
            const adminListDiv = document.getElementById('admin-list');

            if(searchInput) searchInput.addEventListener('input', () => { currentPage = 1; filterAndRender(); });
            if(importFileInput) importFileInput.addEventListener('change', importFromExcel);
            
            document.getElementById('main-content').addEventListener('click', (e) => {
                const target = e.target.closest('button');
                if (!target) return;
                
                // Admin Panel
                if (target.id === 'add-admin-btn') addAdmin();
                if (target.classList.contains('remove-admin-btn')) removeAdmin(target.dataset.uid);
                
                // Controls
                if (target.id === 'add-btn') openModal();
                if (target.id === 'import-btn') importFileInput.click();
                if (target.id === 'download-template-btn') downloadTemplate();
                if (target.id === 'export-btn') exportToExcel();
                
                // Table
                const id = target.dataset.id;
                if (target.classList.contains('copy-btn')) copyToClipboard(target.dataset.text);
                if (target.classList.contains('toggle-password-table')) {
                    const entry = allPasswords.find(p => p.id === id);
                    if(entry) { entry.showPassword = !entry.showPassword; filterAndRender(); }
                }
                if (target.classList.contains('edit-btn')) {
                    const entry = allPasswords.find(p => p.id === id);
                    if (entry) openModal(entry);
                }
                if (target.classList.contains('delete-btn')) handleDelete(id);
            });
        };

        // ===================================================================================
        // APP INITIALIZATION
        // ===================================================================================
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(localStorage.getItem('theme') || 'light');
            bindGlobalListeners();
            
            onAuthStateChanged(auth, async (user) => {
                // Stop listening to old data
                if (unsubscribePasswords) unsubscribePasswords();
                if (unsubscribeAdmins) unsubscribeAdmins();
                allPasswords = [];
                adminUIDs = [];
                
                currentUser = user;
                if (user) {
                    console.log("User UID:", user.uid); // In ra UID để admin dễ dàng copy
                    toggleLoading(true, 'Đang xác thực quyền truy cập...');
                    isAdmin = await checkAdminStatus(user);
                    toggleLoading(false);
                } else {
                    isAdmin = false;
                }
                updateAuthPill(user);
                renderMainUI();
            });
            
            lucide.createIcons();
        });
    </script>
</body>
</html>
